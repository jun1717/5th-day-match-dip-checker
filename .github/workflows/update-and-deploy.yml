name: Update and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0,20,40 0-5 * * 1-5'  # 09:00〜14:40 JST (00:00〜05:40 UTC)
    - cron: '0,20 6 * * 1-5'        # 15:00〜15:20 JST (06:00〜06:20 UTC)
    - cron: '30 7 * * 1-5'          # 16:30 JST 大引け後（確定日足でシグナル履歴スナップショット）
  workflow_dispatch:

permissions:
  contents: write  # data/history へのシグナル履歴コミットのため
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch prices
        run: python scripts/fetch_prices.py

      - name: Evaluate candidates
        run: npm run evaluate

      # スナップショットは確定日足が取れる大引け後の実行と手動実行のみ（場中の20分毎実行では記録しない）
      - name: Snapshot signals
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 7 * * 1-5'
        run: npm run snapshot

      - name: Commit signal history
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 7 * * 1-5'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history
          if git diff --cached --quiet; then
            echo "no snapshot changes"
          else
            git commit -m "chore: snapshot signals $(TZ=Asia/Tokyo date +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Set base path from repo name
        id: base
        run: echo "path=/${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
